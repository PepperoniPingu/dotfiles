cursor_shape beam
cursor_shape_unfocused beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
confirm_os_windo_close 1
notify_on_cmd_finish never
linux_display_server x11

map ctrl+w close_window
map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter

allow_remote_control yes

map ctrl+shift+i remote_control set-colors --all --configured ~/.config/kitty/kanagawa.conf
map ctrl+shift+o remote_control set-colors --all --configured ~/.config/kitty/kanagawa-lotus.conf

include kanagawa.conf
